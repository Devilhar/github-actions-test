name: Create GitHub Release

inputs:
  full-version:
    description: "Version number (e.g. 1.2.3)"
    required: true
  build-file-path:
    description: "File path to the build zip"
    required: true
  changelog:
    description: "The log for the changes included in this release"
    required: true
  github-token:
    description: "The authentication token for Github"
    required: true

runs:
  using: "composite"
  steps:
    - name: Create Release
      id: create-release
      shell: bash
      env:
        GITHUB_TOKEN: ${{ inputs.github-token }}
      run: |
        VERSION="${{ inputs.full-version }}"
        TAG="v$VERSION"

        gh release create "$TAG" \
          ${{ inputs.build-file-path }} \
          --title "$TAG" \
          --notes "${{ inputs.changelog }}"