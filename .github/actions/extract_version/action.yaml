name: Extract Version

inputs:
  version-file-path:
    description: "File to be read from."
    default: "${{ github.workspace }}/folder/info.json"

outputs:
  major:
    description: "Major version"
    value: ${{ steps.read_version.outputs.major }}
  minor:
    description: "Minor version"
    value: ${{ steps.read_version.outputs.minor }}
  patch:
    description: "Patch version"
    value: ${{ steps.read_version.outputs.patch }}

runs:
  using: "composite"
  steps:
    - name: Read version
      id: read_version
      run: |
        VERSION=$(jq -r '.version' '${{ inputs.version-file-path }}')

        IFS='.' read -r MAJOR MINOR PATCH <<< "$VERSION"

        echo "major=$MAJOR" >> "$GITHUB_OUTPUT"
        echo "minor=$MINOR" >> "$GITHUB_OUTPUT"
        echo "patch=$PATCH" >> "$GITHUB_OUTPUT"