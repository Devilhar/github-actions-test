name: Create GitHub Release

on:
  workflow_dispatch:
    inputs:
      version:
        description: "Version number (e.g. 1.2.3)"
        required: true

jobs:
  release:
    runs-on: ubuntu-latest

    permissions:
      contents: write

    steps:
      - name: Download build artifact
        uses: actions/download-artifact@v4
        with:
          name: build-zip
          path: dist

      - name: Verify artifact exists
        run: |
          test -f dist/cargo-drone_${{ github.event.inputs.version }}.zip || (echo "Artifact not found" && exit 1)

      - name: Create Release
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          VERSION="${{ github.event.inputs.version }}"
          TAG="v$VERSION"

          gh release create "$TAG" \
            dist/cargo-drone_${{ github.event.inputs.version }}.zip \
            --title "$TAG" \
            --notes "Release $TAG"