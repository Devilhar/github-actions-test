name: Create Release Branch

on:
  workflow_dispatch:
    inputs:
      bump:
        description: "Which part to bump (major, minor, patch)"
        required: true
        type: choice
        options:
          - major
          - minor
          - patch
        default: minor

env:
  version-file: "${{ github.workspace }}/folder/info.json"

jobs:
  create_release_branch:
    runs-on: ubuntu-latest

    permissions:
      contents: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Configure Git
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

      - name: "Read version"
        id: extract-version
        uses: ./.github/actions/extract_version

      - name: Calculate new version
        id: bump-version
        run: |
          MAJOR=${{ needs.extract-version.outputs.major }}
          MINOR=${{ needs.extract-version.outputs.minor }}
          PATCH=${{ needs.extract-version.outputs.patch }}

          case "${{ github.event.inputs.bump }}" in
            major)
              MAJOR=$((MAJOR + 1))
              MINOR=0
              PATCH=0
              ;;
            minor)
              MAJOR=$((MAJOR))
              MINOR=$((MINOR + 1))
              PATCH=0
              ;;
            patch)
              MAJOR=$((MAJOR))
              MINOR=$((MINOR))
              PATCH=$((PATCH + 1))
              ;;
          esac

          NEW_VERSION="$MAJOR.$MINOR.$PATCH"
          echo "version=$NEW_VERSION" >> "$GITHUB_OUTPUT"

      - name: Create branch
        run: |
          BRANCH="release/${{ steps.bump-version.outputs.version }}"
          git checkout -b "$BRANCH"

      - name: Update version file
        run: |
          jq '.version = "${{ steps.bump-version.outputs.version }}"' '${{ env.version-file }}' > tmp.json
          mv tmp.json '${{ env.version-file }}'

      - name: Commit and push
        run: |
          git add '${{ env.version-file }}'
          git commit -m "Bumped version to ${{ steps.bump-version.outputs.version }}"
          git push --set-upstream origin "release/${{ steps.bump-version.outputs.version }}"